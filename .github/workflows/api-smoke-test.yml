name: API Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  api-smoke-test:
    name: Test Live Backend API
    runs-on: ubuntu-latest

    steps:
      - name: Check backend root route
        run: curl -f "${{ secrets.BACKEND_URL }}/"

      - name: Check backend health route
        run: curl -f "${{ secrets.BACKEND_URL }}/api/health"

      - name: Check pricing route
        run: curl -f "${{ secrets.BACKEND_URL }}/api/pricing"

      - name: Check RMIE or blueprint route
        run: curl -f "${{ secrets.BACKEND_URL }}/api/blueprint" || curl -f "${{ secrets.BACKEND_URL }}/api/rmie"

      - name: Check AI Voice Agent route
        run: curl -f "${{ secrets.BACKEND_URL }}/api/voice/status" || curl -f "${{ secrets.BACKEND_URL }}/api/voice/health"

      - name: Check Command Center route
        run: curl -f "${{ secrets.BACKEND_URL }}/api/admin/health" || curl -f "${{ secrets.BACKEND_URL }}/api/admin"
